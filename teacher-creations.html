<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Creations — Approach ISC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0c2340;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background-color: #0c2340;
            border-bottom: 2px solid #ae9142;
            padding: 28px 48px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ae9142;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.78rem;
            font-weight: 300;
            color: #c1cddd;
            margin-top: 6px;
            letter-spacing: 0.04em;
        }

        /* ── Main ── */
        main {
            flex: 1;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 32px 64px;
        }

        /* ── Live badge ── */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #ae9142;
            margin-bottom: 12px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ae9142;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(0.85); }
        }

        /* ── Section label ── */
        .section-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(174, 145, 66, 0.7);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(174, 145, 66, 0.15);
        }

        /* ── Cards grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 24px;
            margin-bottom: 56px;
            min-height: 60px;
        }

        /* ── Card ── */
        .card {
            background: #143865;
            border: 1px solid rgba(174, 145, 66, 0.25);
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            animation: cardIn 0.35s ease both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #ae9142;
            box-shadow: 0 10px 30px rgba(174, 145, 66, 0.18);
        }

        .card.pinned {
            border-color: #ae9142;
            box-shadow: 0 0 0 1px #ae9142;
        }

        .pinned-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ae9142;
            color: #0c2340;
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            z-index: 2;
        }

        .card-qr {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 20px 16px;
            background: #ffffff;
            cursor: pointer;
        }

        .card-qr canvas,
        .card-qr img {
            display: block;
        }

        .card-info {
            padding: 12px 16px 14px;
            border-top: 1px solid rgba(174, 145, 66, 0.15);
        }

        .card-creator {
            font-size: 0.82rem;
            font-weight: 600;
            color: #ae9142;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-url {
            font-size: 0.62rem;
            font-weight: 300;
            color: #c1cddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
            opacity: 0.8;
        }

        /* ── Loading / empty ── */
        .loading-state,
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 32px;
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(193, 205, 221, 0.6);
            letter-spacing: 0.04em;
        }

        /* ── Form section ── */
        .form-section {
            background: #143865;
            border: 1px solid rgba(174, 145, 66, 0.25);
            border-radius: 16px;
            padding: 15px 15px 5px;
            margin-bottom: 20px;
        }

        .form-section h2 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #ae9142;
            margin-bottom: 6px;
        }

        .form-section > p {
            font-size: 0.78rem;
            font-weight: 300;
            color: #c1cddd;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 16px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-group label {
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(193, 205, 221, 0.8);
        }

        .form-group input {
            background: #0c2340;
            border: 1px solid rgba(174, 145, 66, 0.35);
            border-radius: 8px;
            padding: 13px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.84rem;
            font-weight: 400;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
        }

        .form-group input::placeholder {
            color: rgba(193, 205, 221, 0.35);
        }

        .form-group input:focus {
            border-color: #ae9142;
            box-shadow: 0 0 0 3px rgba(174, 145, 66, 0.12);
        }

        .btn-submit {
            background: #ae9142;
            color: #0c2340;
            border: none;
            border-radius: 8px;
            padding: 13px 32px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }

        .btn-submit:hover:not(:disabled) {
            background: #d39f10;
            box-shadow: 0 4px 16px rgba(174, 145, 66, 0.3);
        }

        .btn-submit:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-submit:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* ── Status ── */
        .status-message {
            margin-top: 14px;
            font-size: 0.76rem;
            font-weight: 500;
            min-height: 20px;
            letter-spacing: 0.02em;
            transition: opacity 0.3s;
        }

        .status-message.success { color: #ae9142; }
        .status-message.error   { color: #e05050; }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 20px 24px;
            font-size: 0.62rem;
            font-weight: 300;
            color: rgba(193, 205, 221, 0.35);
            border-top: 1px solid rgba(174, 145, 66, 0.08);
            letter-spacing: 0.04em;
        }

        /* ── Responsive ── */
        @media (max-width: 820px) {
            header { padding: 22px 24px; }
            main   { padding: 36px 20px 48px; }

            .form-row {
                grid-template-columns: 1fr;
            }

            .btn-submit {
                width: 100%;
                padding: 14px;
            }

            .form-section {
                padding: 28px 24px 32px;
            }
        }

        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 16px;
            }

            header h1 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Teacher Creations</h1>
    <p>Approach International Student Center &mdash; Summer 2026 PD Session</p>
</header>

<main>

    <div class="form-section">
        <h2>Share Your Page</h2>
        <div class="form-row">
            <div class="form-group">
                <label for="creatorName">Your Name</label>
                <input type="text" id="creatorName" placeholder="e.g. John Doe" autocomplete="off" maxlength="60">
            </div>
            <div class="form-group">
                <label for="pageUrl">Page URL</label>
                <input type="url" id="pageUrl" placeholder="https://..." autocomplete="off" maxlength="500">
            </div>
            <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Share</button>
        </div>
        <div class="status-message" id="statusMsg"></div>
    </div>

    <div class="live-badge">
        <span class="live-dot"></span>
        Live &mdash; updates in real time
    </div>

    <div class="section-label">Shared Pages</div>

    <div class="cards-grid" id="cardsGrid">
        <div class="loading-state">Loading&hellip;</div>
    </div>

    

</main>

<footer>
    Copyright &copy; 2026 Approach International Student Center, Inc.
</footer>

<script>
    const SUPABASE_URL = 'https://iyxstutjjoklinumwjsz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5eHN0dXRqam9rbGludW13anN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzkyNzksImV4cCI6MjA5ODQxNTI3OX0.pudmiELMHeluekwIE-AfytWxsXMZ1UPUeSWBkmZnh4s';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const grid = document.getElementById('cardsGrid');

    // ── Helpers ──────────────────────────────────────────

    function esc(text) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(String(text)));
        return d.innerHTML;
    }

    function shortenUrl(url) {
        try {
            const u = new URL(url);
            return u.hostname + (u.pathname !== '/' ? u.pathname : '');
        } catch {
            return url;
        }
    }

    // ── Card factory ──────────────────────────────────────

    function buildCard(creatorName, pageUrl, pinned) {
        const card = document.createElement('div');
        card.className = 'card' + (pinned ? ' pinned' : '');

        if (pinned) {
            const badge = document.createElement('div');
            badge.className = 'pinned-badge';
            badge.textContent = 'This Page';
            card.appendChild(badge);
        }

        const qrWrap = document.createElement('div');
        qrWrap.className = 'card-qr';
        qrWrap.title = pageUrl;
        qrWrap.addEventListener('click', () => window.open(pageUrl, '_blank'));

        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = `
            <div class="card-creator">${esc(creatorName)}</div>
            <div class="card-url">${esc(shortenUrl(pageUrl))}</div>
        `;

        card.appendChild(qrWrap);
        card.appendChild(info);

        // QR code is injected into qrWrap after append
        requestAnimationFrame(() => {
            new QRCode(qrWrap, {
                text: pageUrl,
                width: 150,
                height: 150,
                colorDark: '#0c2340',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        });

        return card;
    }

    // ── Render ────────────────────────────────────────────

    function renderPinnedCard() {
        const pageUrl = window.location.href.split('?')[0]; // strip query if any
        const card = buildCard('This Page', pageUrl, true);
        grid.insertBefore(card, grid.firstChild);
    }

    function clearLoading() {
        const placeholder = grid.querySelector('.loading-state, .empty-state');
        if (placeholder) placeholder.remove();
    }

    async function loadCreations() {
        const { data, error } = await db
            .from('teacher_creations')
            .select('*')
            .order('created_at', { ascending: true });

        clearLoading();

        if (error) {
            console.error('Load error:', error);
            return;
        }

        if (data.length === 0) {
            const el = document.createElement('div');
            el.className = 'empty-state';
            el.id = 'emptyState';
            el.textContent = 'No pages shared yet. Be the first!';
            grid.appendChild(el);
            return;
        }

        data.forEach(row => grid.appendChild(buildCard(row.creator_name, row.page_url, false)));
    }

    function subscribeRealtime() {
        db.channel('public:teacher_creations')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'teacher_creations'
            }, ({ new: row }) => {
                const empty = document.getElementById('emptyState');
                if (empty) empty.remove();
                grid.appendChild(buildCard(row.creator_name, row.page_url, false));
            })
            .subscribe();
    }

    // ── Form submit ───────────────────────────────────────

    async function handleSubmit() {
        const nameInput = document.getElementById('creatorName');
        const urlInput  = document.getElementById('pageUrl');
        const btn       = document.getElementById('submitBtn');
        const name = nameInput.value.trim();
        const url  = urlInput.value.trim();

        if (!name) { showStatus('Please enter your name.', 'error'); nameInput.focus(); return; }
        if (!url)  { showStatus('Please enter a page URL.', 'error'); urlInput.focus(); return; }

        try { new URL(url); } catch {
            showStatus('Please enter a valid URL, including https://', 'error');
            urlInput.focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Sharing…';

        const { error } = await db.from('teacher_creations').insert({ creator_name: name, page_url: url });

        btn.disabled = false;
        btn.textContent = 'Share';

        if (error) {
            console.error('Insert error:', error);
            showStatus('Something went wrong. Please try again.', 'error');
        } else {
            nameInput.value = '';
            urlInput.value  = '';
            showStatus('Your page has been shared!', 'success');
            setTimeout(() => showStatus('', ''), 4000);
        }
    }

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.textContent = msg;
        el.className = 'status-message' + (type ? ' ' + type : '');
    }

    // Enter key submits
    ['creatorName', 'pageUrl'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSubmit();
        });
    });

    // ── Init ──────────────────────────────────────────────

    renderPinnedCard();
    loadCreations().then(subscribeRealtime);
</script>

</body>
</html>
