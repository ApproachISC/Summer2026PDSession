<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My HTML Pages – Showcase</title>
  <meta name="description"
    content="An interactive showcase of HTML projects with live preview and QR code for mobile testing." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* ─── Reset & Base ──────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #7c6fff;
      --accent-glow: rgba(124, 111, 255, 0.35);
      --accent2: #ff6fd8;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --text-dim: #9898b0;
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Layout Shell ──────────────────────────────────────── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ─── Top Bar ───────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
      z-index: 10;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .topbar-center {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      justify-content: center;
      min-width: 0;
    }

    .page-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }

    .slide-counter {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 16px;
      text-decoration: none;
    }

    .btn-icon:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* ─── Main Content ──────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Iframe Panel ──────────────────────────────────────── */
    .preview-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .iframe-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .page-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .page-iframe.loaded {
      opacity: 1;
    }

    .iframe-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surface);
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .iframe-loading.hidden {
      opacity: 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Nav arrows on the preview panel */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 44px;
      height: 44px;
      background: rgba(10, 10, 15, 0.7);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 18px;
      transition: all var(--transition);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      user-select: none;
    }

    .nav-arrow:hover {
      background: rgba(124, 111, 255, 0.2);
      color: var(--text);
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .nav-arrow.disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    .nav-prev {
      left: 16px;
    }

    .nav-next {
      right: 16px;
    }

    /* ─── Right Panel ───────────────────────────────────────── */
    .side-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px;
      gap: 20px;
      overflow-y: auto;
    }

    .side-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      align-self: flex-start;
    }

    /* QR Card */
    .qr-card {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .qr-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, var(--accent-glow), transparent 70%);
      pointer-events: none;
    }

    .qr-box {
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .qr-box:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
    }

    .qr-hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    /* Page info card */
    .info-card {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .info-url {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
      line-height: 1.5;
      font-family: monospace;
    }

    .info-divider {
      height: 1px;
      background: var(--border);
    }

    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all var(--transition);
    }

    .copy-btn:hover {
      background: rgba(124, 111, 255, 0.12);
      color: var(--accent);
      border-color: var(--accent);
    }

    .copy-btn.copied {
      color: #5de6a0;
      border-color: #5de6a0;
      background: rgba(93, 230, 160, 0.1);
    }

    /* ─── Bottom Dots ───────────────────────────────────────── */
    .dots-bar {
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
    }

    .dot:hover {
      background: var(--text-muted);
    }

    .dot.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      width: 22px;
      border-radius: 4px;
    }

    /* ─── Empty state ───────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-icon {
      font-size: 40px;
    }

    /* ─── Tooltip ───────────────────────────────────────────── */
    [data-tooltip] {
      position: relative;
    }

    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e2e;
      color: var(--text);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      border: 1px solid var(--border);
    }

    [data-tooltip]:hover::after {
      opacity: 1;
    }

    /* ─── Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <!-- ═══════════════════════════════════════════════
     ✏️  CONFIGURATION — Edit your pages here
     ═══════════════════════════════════════════════ -->
  <script>
    const pages = [
      {
        title: "Inbox Triage",
        url: "https://masolucas.github.io/ApproachClasses/ExpositoryWritingWithAI/week-7-inbox-triage.html"
      },
      {
        title: "Register Detective",
        url: "https://masolucas.github.io/ApproachClasses/ExpositoryWritingWithAI/week-7-register-detective.html"
      },
      {
        title: "Signs, Safety & Game",
        url: "https://masolucas.github.io/ApproachClasses/SurvivalEnglish/Week2_Signs_Safety_Game.html"
      },
      {
        title: "Scam or Safe?",
        url: "https://masolucas.github.io/ApproachClasses/SurvivalEnglish/Week-8-scam-or-safe-game.html"
      }
    ];
  </script>
  <!-- ═══════════════════════════════════════════════ -->


  <div class="shell">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-brand">
        <div class="brand-icon">🖥️</div>
        <span class="brand-name">Showcase</span>
      </div>

      <div class="topbar-center">
        <span class="page-title" id="topTitle">—</span>
        <span class="slide-counter" id="slideCounter">— / —</span>
      </div>

      <div class="topbar-actions">
        <a id="openTabBtn" href="#" target="_blank" rel="noopener" class="btn-icon" data-tooltip="Open in new tab"
          title="Open in new tab">
          ↗
        </a>
      </div>
    </header>

    <!-- Main -->
    <div class="main">

      <!-- Preview Panel -->
      <div class="preview-panel">

        <!-- Prev arrow -->
        <button class="nav-arrow nav-prev" id="prevBtn" aria-label="Previous page">&#8249;</button>

        <!-- Iframe wrapper -->
        <div class="iframe-wrapper">
          <div class="iframe-loading" id="loadingOverlay">
            <div class="spinner"></div>
            <span class="loading-text">Loading page…</span>
          </div>
          <iframe id="pageFrame" class="page-iframe" title="Page Preview" allowfullscreen loading="lazy"></iframe>
        </div>

        <!-- Next arrow -->
        <button class="nav-arrow nav-next" id="nextBtn" aria-label="Next page">&#8250;</button>
      </div>

      <!-- Side Panel -->
      <aside class="side-panel">
        <span class="side-label">Scan to Test</span>

        <div class="qr-card">
          <div class="qr-box">
            <div id="qrcode"></div>
          </div>
          <p class="qr-hint">Scan with your phone to open this page on your device</p>
        </div>

        <span class="side-label">Page Info</span>

        <div class="info-card">
          <div class="info-title" id="infoTitle">—</div>
          <div class="info-divider"></div>
          <div class="info-url" id="infoUrl">—</div>
          <div class="info-divider"></div>
          <button class="copy-btn" id="copyBtn">
            <span>📋</span> Copy URL
          </button>
        </div>
      </aside>
    </div>

    <!-- Dots Bar -->
    <div class="dots-bar" id="dotsBar"></div>
  </div>


  <script>
    // ─── State ──────────────────────────────────────────────────
    let current = 0;
    let qrInstance = null;

    // ─── Element refs ────────────────────────────────────────────
    const frame = document.getElementById('pageFrame');
    const loadingOvl = document.getElementById('loadingOverlay');
    const topTitle = document.getElementById('topTitle');
    const slideCounter = document.getElementById('slideCounter');
    const openTabBtn = document.getElementById('openTabBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsBar = document.getElementById('dotsBar');
    const infoTitle = document.getElementById('infoTitle');
    const infoUrl = document.getElementById('infoUrl');
    const copyBtn = document.getElementById('copyBtn');
    const qrContainer = document.getElementById('qrcode');

    // ─── Build dots ──────────────────────────────────────────────
    function buildDots() {
      dotsBar.innerHTML = '';
      pages.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === current ? ' active' : '');
        dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
        dot.addEventListener('click', () => goTo(i));
        dotsBar.appendChild(dot);
      });
    }

    function updateDots() {
      dotsBar.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    // ─── QR Code ─────────────────────────────────────────────────
    function renderQR(url) {
      qrContainer.innerHTML = '';
      qrInstance = new QRCode(qrContainer, {
        text: url,
        width: 180,
        height: 180,
        colorDark: '#0a0a0f',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    // ─── Navigate ────────────────────────────────────────────────
    function goTo(index) {
      if (index < 0 || index >= pages.length) return;
      current = index;

      const page = pages[current];

      // Show loading state
      frame.classList.remove('loaded');
      loadingOvl.classList.remove('hidden');

      // Update iframe
      frame.src = page.url;

      // Update top bar
      topTitle.textContent = page.title;
      slideCounter.textContent = (current + 1) + ' / ' + pages.length;
      openTabBtn.href = page.url;

      // Update side panel
      infoTitle.textContent = page.title;
      infoUrl.textContent = page.url;

      // Update QR
      renderQR(page.url);

      // Update nav arrows
      prevBtn.classList.toggle('disabled', current === 0);
      nextBtn.classList.toggle('disabled', current === pages.length - 1);

      // Update dots
      updateDots();

      // Reset copy button
      copyBtn.classList.remove('copied');
      copyBtn.innerHTML = '<span>📋</span> Copy URL';
    }

    // ─── Iframe load event ───────────────────────────────────────
    frame.addEventListener('load', () => {
      frame.classList.add('loaded');
      loadingOvl.classList.add('hidden');
    });

    // ─── Arrow buttons ───────────────────────────────────────────
    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    // ─── Keyboard navigation ─────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    // ─── Copy URL ────────────────────────────────────────────────
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(pages[current].url);
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = '<span>✅</span> Copied!';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = '<span>📋</span> Copy URL';
        }, 2000);
      } catch (err) {
        copyBtn.innerHTML = '<span>⚠️</span> Failed';
        setTimeout(() => {
          copyBtn.innerHTML = '<span>📋</span> Copy URL';
        }, 2000);
      }
    });

    // ─── Init ────────────────────────────────────────────────────
    if (pages.length === 0) {
      frame.parentElement.innerHTML =
        '<div class="empty-state">' +
        '<span class="empty-icon">📂</span>' +
        '<span>No pages configured yet. Add entries to the pages array.</span>' +
        '</div>';
      dotsBar.style.display = 'none';
    } else {
      buildDots();
      goTo(0);
    }
  </script>

</body>

</html>
